<!-- ADD THIS IN NAV -->

<a onclick="showSection('admin')">Admin</a>

<!-- ADD THIS SECTION BELOW CONTACT -->

<section id="admin" class="section">
<h2>📊 Enquiries Dashboard</h2>

<table style="width:100%;border-collapse:collapse;background:#0f172a;">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Message</th>
<th>Date</th>
</tr>
</thead>
<tbody id="adminData"></tbody>
</table>
</section>

<!-- UPDATE FIREBASE SCRIPT -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting",
  storageBucket: "alakesh-consulting.firebasestorage.app",
  messagingSenderId: "125264295296",
  appId: "1:125264295296:web:bf72dc33f7b648994d3d65"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* FORM SUBMIT */
window.submitForm = async function(e) {
  e.preventDefault();

  const name = document.querySelector('[name="name"]').value;
  const email = document.querySelector('[name="email"]').value;
  const phone = document.querySelector('[name="phone"]').value;
  const service = document.querySelector('[name="service"]').value;
  const message = document.querySelector('[name="message"]').value;

  await addDoc(collection(db, "enquiries"), {
    name,
    email,
    phone,
    service,
    message,
    createdAt: new Date()
  });

  alert("✅ Enquiry submitted!");
  e.target.reset();
};

/* LOAD ADMIN DATA */
async function loadAdminData(){
  const table = document.getElementById("adminData");
  table.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "enquiries"));

  if(querySnapshot.empty){
    table.innerHTML = "<tr><td colspan='6'>No enquiries found</td></tr>";
    return;
  }

  querySnapshot.forEach(doc => {
    const d = doc.data();

    let date = "";
    if(d.createdAt){
      if(d.createdAt.seconds){
        date = new Date(d.createdAt.seconds * 1000).toLocaleString();
      } else {
        date = new Date(d.createdAt).toLocaleString();
      }
    }

    const row = `
      <tr>
        <td>${d.name || ''}</td>
        <td>${d.email || ''}</td>
        <td>${d.phone || ''}</td>
        <td>${d.service || ''}</td>
        <td>${d.message || ''}</td>
        <td>${date}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

/* LOAD DATA WHEN ADMIN OPENED */
const originalShowSection = window.showSection;
window.showSection = function(id){
  originalShowSection(id);
  if(id === "admin"){
    loadAdminData();
  }
};
</script>
