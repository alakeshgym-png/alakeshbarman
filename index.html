<!-- SAME CODE WITH PROFESSIONAL ENHANCEMENTS -->

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e2e8f0;
scroll-behavior:smooth;
}

/* HEADER */
header{
text-align:center;
padding:40px 20px;
}
header h1{font-size:34px;margin-bottom:10px}
header p{color:#94a3b8}

/* NAVBAR */
nav{
display:flex;
justify-content:center;
gap:25px;
padding:15px;
position:sticky;
top:0;
background:rgba(2,6,23,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}

nav a{
cursor:pointer;
color:#cbd5f5;
text-decoration:none;
transition:0.3s;
font-weight:500;
}

nav a:hover{
color:#38bdf8;
transform:scale(1.1);
}

/* SECTION */
.section{
display:none;
padding:80px 20px;
max-width:1100px;
margin:auto;
animation:fadeIn 0.6s ease;
}

.active{display:block}

/* HERO */
.hero{text-align:center;padding:120px 20px}
.hero h2{font-size:42px;margin-bottom:20px}
.hero p{color:#94a3b8;margin-bottom:25px}

/* BUTTON */
.btn{
padding:14px 26px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
border-radius:8px;
cursor:pointer;
color:#000;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(56,189,248,0.4);
}

/* CARDS */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:15px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* GRID */
.services,.cases{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* TESTIMONIAL */
.testimonial-box{
max-width:700px;
margin:auto;
text-align:center;
}

.stars{color:#facc15;font-size:20px}

/* LINKS */
.links{
margin-top:30px;
text-align:center;
}

.links a{
color:#38bdf8;
margin:0 10px;
text-decoration:none;
transition:0.3s;
}

.links a:hover{
text-decoration:underline;
}

/* FORM */
form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
}

input, textarea, select{
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
transition:0.3s;
}

input:focus, textarea:focus, select:focus{
outline:none;
box-shadow:0 0 0 2px #38bdf8;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:18px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>

<script>
/* NAV ACTIVE HIGHLIGHT */
const navLinks = document.querySelectorAll("nav a");

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

navLinks.forEach(link=>link.classList.remove("active"));
}

/* TYPEWRITER */
const text="Microsoft 365 | Azure | Networking | Security Expert";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}
type();

/* TESTIMONIAL ROTATION */
const testimonials=[
{text:"Alakesh handled our Microsoft 365 migration flawlessly.",author:"— IT Manager"},
{text:"Azure setup with strong security and optimization.",author:"— Cloud Lead"},
{text:"Excellent networking and firewall expertise.",author:"— Network Admin"},
{text:"Defender & SIEM improved our security posture.",author:"— Security Analyst"}
];

let index=0;
function showTestimonial(){
document.getElementById("testimonial-text").innerText=testimonials[index].text;
document.getElementById("testimonial-author").innerText=testimonials[index].author;
index=(index+1)%testimonials.length;
}
setInterval(showTestimonial,3000);
showTestimonial();
</script>
