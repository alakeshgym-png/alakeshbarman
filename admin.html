<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
margin:0;
}

/* LOGIN */
#loginBox{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* DASHBOARD */
#dashboard{display:none;padding:20px;}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
cursor:pointer;
color:#38bdf8;
font-weight:600;
}

/* STATS */
.stats{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* SEARCH */
.search{
margin-bottom:15px;
}

/* TABLE */
.table-container{
background:rgba(255,255,255,0.05);
border-radius:12px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th, td{
padding:14px;
text-align:left;
}

th{
background:#1e293b;
}

tr{
border-bottom:1px solid #1e293b;
}

tr:hover{
background:#1e293b;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">
<div class="login-card">
<h2>🔐 Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">
<h2>📊 Enquiries Dashboard</h2>
<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="stats">
<div>Total Enquiries: <strong id="count">0</strong></div>
<input type="text" id="search" placeholder="Search..." style="width:200px;">
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Message</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allData = [];

signOut(auth);

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch{
    alert("❌ Invalid Email or Password");
  }
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* AUTH */
onAuthStateChanged(auth, user => {
  if(user && user.email==="alakesh.gym@gmail.com"){
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadData();
  }else{
    loginBox.style.display="flex";
    dashboard.style.display="none";
  }
});

/* LOAD DATA */
async function loadData(){
  const snapshot = await getDocs(collection(db,"enquiries"));
  allData = [];

  snapshot.forEach(doc=>{
    allData.push(doc.data());
  });

  render(allData);
}

/* RENDER */
function render(data){
  dataEl.innerHTML="";
  count.innerText=data.length;

  if(data.length===0){
    dataEl.innerHTML="<tr><td colspan='5'>No enquiries found</td></tr>";
    return;
  }

  data.forEach(d=>{
    dataEl.innerHTML+=`
    <tr>
    <td>${d.name||''}</td>
    <td>${d.email||''}</td>
    <td>${d.phone||''}</td>
    <td>${d.service||''}</td>
    <td>${d.message||''}</td>
    </tr>`;
  });
}

/* SEARCH */
search.oninput=()=>{
  const v=search.value.toLowerCase();
  render(allData.filter(d=>
    (d.name||'').toLowerCase().includes(v) ||
    (d.email||'').toLowerCase().includes(v) ||
    (d.service||'').toLowerCase().includes(v)
  ));
};
</script>

</body>
</html>
