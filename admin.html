<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
margin:0;
}

/* LOGIN */
#loginBox{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;padding:20px;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
cursor:pointer;
color:#38bdf8;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin:20px 0;
}

.card{
flex:1;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
text-align:center;
}

.card h2{
color:#38bdf8;
}

/* SEARCH */
.search{
margin-bottom:20px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.05);
}

th, td{
padding:12px;
}

th{
background:#1e293b;
}

tr{
border-bottom:1px solid #1e293b;
}

.status{
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

.new{background:#facc15;color:black;}
.contacted{background:#38bdf8;}
.closed{background:#22c55e;}

.action-btn{
background:#38bdf8;
color:black;
margin:2px;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">
<div class="login-card">
<h2>🔐 Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">
<h2>📊 CRM Dashboard</h2>
<div class="logout" onclick="logout()">Logout</div>
</div>

<div class="stats">
<div class="card"><p>Total</p><h2 id="total">0</h2></div>
<div class="card"><p>New</p><h2 id="new">0</h2></div>
<div class="card"><p>Closed</p><h2 id="closed">0</h2></div>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search leads...">
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

signOut(auth);

window.login = async function(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if(user && user.email==="alakesh.gym@gmail.com"){
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadData();
  }else{
    loginBox.style.display="flex";
    dashboard.style.display="none";
  }
});

let leads=[];

async function loadData(){
  const snap = await getDocs(collection(db,"enquiries"));
  leads=[];

  snap.forEach(docSnap=>{
    const d=docSnap.data();
    leads.push({...d,id:docSnap.id,status:d.status||"new"});
  });

  render(leads);
}

function render(data){
  dataEl.innerHTML="";
  total.innerText=data.length;
  new.innerText=data.filter(l=>l.status==="new").length;
  closed.innerText=data.filter(l=>l.status==="closed").length;

  data.forEach(l=>{
    dataEl.innerHTML+=`
    <tr>
    <td>${l.name}</td>
    <td>${l.email}</td>
    <td>${l.phone}</td>
    <td>${l.service}</td>
    <td><span class="status ${l.status}">${l.status}</span></td>
    <td>
    <span class="action-btn" onclick="updateStatus('${l.id}','contacted')">Contacted</span>
    <span class="action-btn" onclick="updateStatus('${l.id}','closed')">Close</span>
    </td>
    </tr>`;
  });
}

window.updateStatus = async function(id,status){
  await updateDoc(doc(db,"enquiries",id),{status});
  loadData();
};

search.oninput = ()=>{
  const v=search.value.toLowerCase();
  render(leads.filter(l=>l.name.toLowerCase().includes(v)));
};
</script>

</body>
</html>
