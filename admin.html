<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allData = [];

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    console.log("Login success");
  }catch(err){
    console.error(err);
    alert("❌ Login failed");
  }
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

  if(user && user.email === "alakesh.gym@gmail.com"){
    console.log("User authenticated:", user.email);

    loginBox.style.display="none";
    dashboard.style.display="block";

    await loadData();   // ✅ WAIT FOR DATA

  } else {
    loginBox.style.display="flex";
    dashboard.style.display="none";
  }
});

/* LOAD DATA */
async function loadData(){
  try{
    console.log("Fetching data...");

    const snapshot = await getDocs(collection(db,"enquiries"));

    console.log("Docs found:", snapshot.size);

    allData = [];

    snapshot.forEach(doc=>{
      allData.push(doc.data());
    });

    render(allData);

  }catch(err){
    console.error("Firestore error:", err);
    alert("❌ Error loading data (Check Firestore Rules)");
  }
}

/* RENDER */
function render(data){
  dataEl.innerHTML="";
  count.innerText=data.length;

  if(data.length===0){
    dataEl.innerHTML="<tr><td colspan='5'>No enquiries found</td></tr>";
    return;
  }

  data.forEach(d=>{
    dataEl.innerHTML+=`
    <tr>
    <td>${d.name||''}</td>
    <td>${d.email||''}</td>
    <td>${d.phone||''}</td>
    <td>${d.service||''}</td>
    <td>${d.message||''}</td>
    </tr>`;
  });
}

/* SEARCH */
search.oninput=()=>{
  const v=search.value.toLowerCase();

  render(allData.filter(d=>
    (d.name||'').toLowerCase().includes(v) ||
    (d.email||'').toLowerCase().includes(v) ||
    (d.service||'').toLowerCase().includes(v)
  ));
};
</script>
