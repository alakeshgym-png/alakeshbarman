<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - Enquiries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#020617;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:#0f172a;
border-radius:10px;
overflow:hidden;
}

th, td{
padding:12px;
border-bottom:1px solid #1e293b;
text-align:left;
}

th{
background:#1e293b;
}

tr:hover{
background:#1e293b;
}
</style>

</head>

<body>

<h1>📊 Enquiries Dashboard</h1>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Message</th>
<th>Date</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("data");

async function loadData(){
  const querySnapshot = await getDocs(collection(db, "enquiries"));

  querySnapshot.forEach(doc => {
    const d = doc.data();

    const row = `
      <tr>
        <td>${d.name}</td>
        <td>${d.email}</td>
        <td>${d.phone}</td>
        <td>${d.service}</td>
        <td>${d.message}</td>
        <td>${new Date(d.createdAt.seconds * 1000).toLocaleString()}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
