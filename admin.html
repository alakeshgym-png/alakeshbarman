<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Enquiries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
margin:0;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
margin:0;
font-size:26px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

/* SEARCH */
input{
padding:10px;
border-radius:8px;
border:none;
width:300px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.05);
border-radius:10px;
overflow:hidden;
}

th, td{
padding:12px;
text-align:left;
}

th{
background:#1e293b;
}

tr{
border-bottom:1px solid #1e293b;
}

tr:hover{
background:#1e293b;
}

/* STATS */
.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-box{
flex:1;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
text-align:center;
}

.stat-box h2{
margin:0;
font-size:28px;
color:#38bdf8;
}
</style>

</head>

<body>

<div class="header">
<h1>📊 Admin Dashboard</h1>
<input type="text" id="search" placeholder="Search...">
</div>

<div class="stats">
<div class="stat-box">
<p>Total Enquiries</p>
<h2 id="count">0</h2>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Message</th>
<th>Date</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("data");
const countEl = document.getElementById("count");
const search = document.getElementById("search");

let allData = [];

async function loadData(){
  const querySnapshot = await getDocs(collection(db, "enquiries"));

  if(querySnapshot.empty){
    table.innerHTML = "<tr><td colspan='6'>No enquiries found</td></tr>";
    return;
  }

  allData = [];

  querySnapshot.forEach(doc => {
    const d = doc.data();
    allData.push(d);
  });

  renderData(allData);
}

function renderData(data){
  table.innerHTML = "";
  countEl.innerText = data.length;

  data.forEach(d => {

    let date = "";
    if(d.createdAt){
      if(d.createdAt.seconds){
        date = new Date(d.createdAt.seconds * 1000).toLocaleString();
      } else {
        date = new Date(d.createdAt).toLocaleString();
      }
    }

    const row = `
      <tr>
        <td>${d.name || ''}</td>
        <td>${d.email || ''}</td>
        <td>${d.phone || ''}</td>
        <td>${d.service || ''}</td>
        <td>${d.message || ''}</td>
        <td>${date}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

/* SEARCH FUNCTION */
search.addEventListener("input", () => {
  const value = search.value.toLowerCase();

  const filtered = allData.filter(d =>
    (d.name || "").toLowerCase().includes(value) ||
    (d.email || "").toLowerCase().includes(value) ||
    (d.service || "").toLowerCase().includes(value)
  );

  renderData(filtered);
});

loadData();
</script>

</body>
</html>
