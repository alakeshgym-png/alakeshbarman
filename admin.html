<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - Enquiries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
  margin:0;
  padding:20px;
}

/* LOGIN */
#loginBox{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-card{
  background:#0f172a;
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  cursor:pointer;
  color:#38bdf8;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#0f172a;
  border-radius:10px;
  overflow:hidden;
}

th, td{
  padding:12px;
  border-bottom:1px solid #1e293b;
  text-align:left;
}

th{
  background:#1e293b;
}

tr:hover{
  background:#1e293b;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <input type="email" id="email" placeholder="Email" value="alakesh.gym@gmail.com">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">
  <h1>📊 Enquiries Dashboard</h1>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Message</th>
<th>Date</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCi7v9VpYfYS671vwym038Gbaghyw39qUE",
  authDomain: "alakesh-consulting.firebaseapp.com",
  projectId: "alakesh-consulting"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const table = document.getElementById("data");

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch{
    alert("❌ Invalid credentials");
  }
};

/* LOGOUT */
window.logout = function(){
  signOut(auth);
};

/* AUTH CHECK */
onAuthStateChanged(auth, user => {
  if(user && user.email === "alakesh.gym@gmail.com"){
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadData();
  }else{
    loginBox.style.display="flex";
    dashboard.style.display="none";

    if(user){
      alert("🚫 Unauthorized Access");
      signOut(auth);
    }
  }
});

/* LOAD DATA */
async function loadData(){
  const querySnapshot = await getDocs(collection(db, "enquiries"));

  if(querySnapshot.empty){
    table.innerHTML = "<tr><td colspan='6'>No enquiries found</td></tr>";
    return;
  }

  table.innerHTML="";

  querySnapshot.forEach(doc => {
    const d = doc.data();

    let date = "";

    if(d.createdAt){
      if(d.createdAt.seconds){
        date = new Date(d.createdAt.seconds * 1000).toLocaleString();
      } else {
        date = new Date(d.createdAt).toLocaleString();
      }
    }

    const row = `
      <tr>
        <td>${d.name || ''}</td>
        <td>${d.email || ''}</td>
        <td>${d.phone || ''}</td>
        <td>${d.service || ''}</td>
        <td>${d.message || ''}</td>
        <td>${date}</td>
      </tr>
    `;

    table.innerHTML += row;
  });
}
</script>

</body>
</html>
